name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit belongs to main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} is not on main. Refusing release." >&2
            exit 1
          fi

      - name: Validate Docker Hub configuration
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Missing required secret: DOCKERHUB_USERNAME" >&2
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Missing required secret: DOCKERHUB_TOKEN" >&2
            exit 1
          fi
          if [ -z "${DOCKERHUB_REPOSITORY}" ]; then
            echo "Missing required repository variable: DOCKERHUB_REPOSITORY" >&2
            echo "Example value: mydockeruser/fundus-inference" >&2
            exit 1
          fi
          if [ -z "${AZURE_STORAGE_SAS_TOKEN}" ]; then
            echo "Missing required secret: AZURE_STORAGE_SAS_TOKEN" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/inference-server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            AZURE_STORAGE_SAS_TOKEN=${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

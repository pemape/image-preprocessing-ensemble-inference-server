log_level: INFO
force_cpu: false # Set to true if you want to force CPU usage
voting_strategy: soft # Choose 'soft' for probability averaging or 'hard' for majority vote

models:
  - architecture: efficientnetb4
    dataset: APTOS5
    preprocessing_variant: original
    model_path: "models/original.pt"
    num_classes: 5
    input_size: [500, 500]

  - architecture: efficientnetb4
    dataset: APTOS5
    preprocessing_variant: rgb_clahe
    model_path: "models/rgb_clahe.pt"
    num_classes: 5
    input_size: [500, 500]

  - architecture: efficientnetb4
    dataset: APTOS5
    preprocessing_variant: min_pooling
    model_path: "models/min_pooling.pt"
    num_classes: 5
    input_size: [500, 500]

  - architecture: efficientnetb4
    dataset: APTOS5
    preprocessing_variant: lab_clahe
    model_path: "models/lab_clahe.pt"
    num_classes: 5
    input_size: [500, 500]

  - architecture: efficientnetb4
    dataset: APTOS5
    preprocessing_variant: max_green_gsc
    model_path: "models/max_green_gsc.pt"
    num_classes: 5
    input_size: [500, 500]

class_names:
  - "No DR"
  - "Mild DR"
  - "Moderate DR"
  - "Severe DR"
  - "Proliferative DR"

confidence_threshold: 0.5

redis:
  enabled: true
  host: localhost
  port: 6379
  db: 0
  password: null
  ttl: 86400
  key_prefix: fundus_inference

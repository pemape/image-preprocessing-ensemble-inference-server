version: '3.8'

services:
  # Production fundus preprocessing service
  fundus-preprocessing:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: fundus-preprocessing:latest
    container_name: fundus-preprocessing-prod
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./logs:/app/logs
      - ./preprocessing_config.yaml:/app/preprocessing_config.yaml:ro
    environment:
      - LOG_LEVEL=INFO
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fundus-net

  # Development service with additional tools
  fundus-preprocessing-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: fundus-preprocessing:dev
    container_name: fundus-preprocessing-dev
    ports:
      - "8081:8080"
      - "8888:8888"  # Jupyter notebook
    volumes:
      - .:/app
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=DEBUG
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - PYTHONPATH=/app
    networks:
      - fundus-net
    profiles:
      - dev

  # Production fundus inference service with complete pipeline
  fundus-inference:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: fundus-inference:latest
    container_name: fundus-inference-prod
    ports:
      - "5000:5000"
    volumes:
      # Mount your trained models directory
      - C:/ProgrammingProjects/python/dp/lbcnn_pytorch/hns/DR:/app/external_models:ro
      # Mount input directory for batch processing
      - ./input:/app/input
      # Mount output directory
      - ./output:/app/output
      # Mount logs
      - ./logs:/app/logs
      # Mount configs (override defaults if needed)
      - ./classifier_config.yaml:/app/configs/classifier_config.yaml:ro
      - ./preprocessing_config.yaml:/app/configs/preprocessing_config.yaml:ro
      # Mount test images directory
      - D:/FEI STU/ing/2roc/DATABASE/Aptos/train_images:/app/test_images:ro
    environment:
      - LOG_LEVEL=INFO
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - TORCH_HOME=/app/temp/torch
      - HF_HOME=/app/temp/hf
      - CUDA_VISIBLE_DEVICES=0  # Set to empty string for CPU-only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - fundus-net
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # CPU-only inference service (lightweight)
  fundus-inference-cpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: fundus-inference:cpu
    container_name: fundus-inference-cpu
    ports:
      - "5001:5000"
    volumes:
      - C:/ProgrammingProjects/python/dp/lbcnn_pytorch/hns/DR:/app/external_models:ro
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
      - ./classifier_config_cpu.yaml:/app/configs/classifier_config.yaml:ro
      - ./preprocessing_config.yaml:/app/configs/preprocessing_config.yaml:ro
      - D:/FEI STU/ing/2roc/DATABASE/Aptos/train_images:/app/test_images:ro
    environment:
      - LOG_LEVEL=INFO
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - TORCH_HOME=/app/temp/torch
      - CUDA_VISIBLE_DEVICES=""  # Force CPU-only
    restart: unless-stopped
    networks:
      - fundus-net
    profiles:
      - cpu

  # Development service with additional tools and model mounting
  fundus-inference-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: fundus-inference:dev
    container_name: fundus-inference-dev
    ports:
      - "5002:5000"  # Main server
      - "8888:8888"  # Jupyter notebook
      - "6006:6006"  # TensorBoard
    volumes:
      # Mount source code for development
      - .:/app/src
      # Mount models
      - C:/ProgrammingProjects/python/dp/lbcnn_pytorch/hns/DR:/app/external_models:ro
      # Mount additional source directories
      - C:/ProgrammingProjects/python/dp/lbcnn_pytorch:/app/lbcnn_src:ro
      - D:/FEI STU/ing/2roc/DP/01_DP_code/dp/ImageDataPreprocessing:/app/preprocessing_src:ro
      # Working directories
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
      - ./debug:/app/debug
      # Test images
      - D:/FEI STU/ing/2roc/DATABASE/Aptos/train_images:/app/test_images:ro
    environment:
      - LOG_LEVEL=DEBUG
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - PYTHONPATH=/app:/app/src:/app/lbcnn_src:/app/preprocessing_src
      - JUPYTER_ENABLE_LAB=yes
    networks:
      - fundus-net
    profiles:
      - dev

  # Test runner service
  fundus-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: fundus-inference:test
    container_name: fundus-test
    volumes:
      - .:/app/src
      - C:/ProgrammingProjects/python/dp/lbcnn_pytorch/hns/DR:/app/external_models:ro
      - D:/FEI STU/ing/2roc/DATABASE/Aptos/train_images:/app/test_images:ro
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app:/app/src
      - TEST_IMAGE_PATH=/app/test_images/00a8624548a9.png
    working_dir: /app/src
    command: ["python", "-m", "pytest", "_Tests/", "-v", "--tb=short"]
    networks:
      - fundus-net
    profiles:
      - test

  # Batch processing service
  fundus-batch:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: fundus-inference:batch
    container_name: fundus-batch
    volumes:
      - C:/ProgrammingProjects/python/dp/lbcnn_pytorch/hns/DR:/app/external_models:ro
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
      - ./classifier_config.yaml:/app/configs/classifier_config.yaml:ro
      - ./preprocessing_config.yaml:/app/configs/preprocessing_config.yaml:ro
      # Mount entire APTOS dataset for batch processing
      - D:/FEI STU/ing/2roc/DATABASE/Aptos/train_images:/app/batch_input:ro
    environment:
      - LOG_LEVEL=INFO
      - BATCH_MODE=true
      - CUDA_VISIBLE_DEVICES=0
    networks:
      - fundus-net
    profiles:
      - batch

  # Model comparison service (for testing different voting strategies)
  fundus-compare:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: fundus-inference:compare
    container_name: fundus-compare
    ports:
      - "5003:5000"
    volumes:
      - C:/ProgrammingProjects/python/dp/lbcnn_pytorch/hns/DR:/app/external_models:ro
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
      - ./classifier_config_hard_voting.yaml:/app/configs/classifier_config.yaml:ro
      - ./preprocessing_config.yaml:/app/configs/preprocessing_config.yaml:ro
      - D:/FEI STU/ing/2roc/DATABASE/Aptos/train_images:/app/test_images:ro
    environment:
      - LOG_LEVEL=INFO
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - VOTING_STRATEGY=hard
    networks:
      - fundus-net
    profiles:
      - compare

  # Nginx reverse proxy for load balancing
  nginx:
    image: nginx:alpine
    container_name: fundus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - fundus-inference
    networks:
      - fundus-net
    profiles:
      - production

  # Redis for result caching
  redis:
    image: redis:alpine
    container_name: fundus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - fundus-net
    profiles:
      - cache

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus
    container_name: fundus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - fundus-net
    profiles:
      - monitoring

networks:
  fundus-net:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
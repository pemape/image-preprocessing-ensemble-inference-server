servers:
- description: Local development server
  url: http://localhost:5000
- description: Production server
  url: http://0.0.0.0:5000
tags:
- description: Health checks and server information
  name: Health & Info
- description: Redis cache management endpoints
  name: Cache Management
- description: Full Pipeline of combined preprocessing and classification
  name: Single processing
paths:
  /cache/clear:
    post:
      description: Clear all or pattern-matched cached entries
      operationId: clear_cache
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clearCache_request"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheClearResponse"
          description: Cache cleared successfully
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Cache clear error
      summary: Clear cache
      tags:
      - Cache Management
      x-openapi-router-controller: ensemble_inference.controllers.cache_management_controller
  /cache/health:
    get:
      description: Check Redis cache connection health
      operationId: get_cache_health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheHealthResponse"
          description: Cache health status
      summary: Get cache health
      tags:
      - Cache Management
      x-openapi-router-controller: ensemble_inference.controllers.cache_management_controller
  /cache/stats:
    get:
      description: "Retrieve Redis cache statistics including hits, misses, and hit\
        \ rate"
      operationId: get_cache_stats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStatsResponse"
          description: Cache statistics
      summary: Get cache statistics
      tags:
      - Cache Management
      x-openapi-router-controller: ensemble_inference.controllers.cache_management_controller
  /classify:
    post:
      description: |
        Classify diabetic retinopathy from preprocessed image variants.

        Dynamic batching is handled transparently on the server side.
        Clients do not need to provide any batching-specific path parameter.
      operationId: classify_image
      parameters:
      - description: Ensemble voting strategy for classification
        examples:
          soft:
            summary: Soft voting (probability averaging)
            value: soft
          hard:
            summary: Hard voting (majority vote)
            value: hard
        explode: true
        in: query
        name: voting_strategy
        required: false
        schema:
          $ref: "#/components/schemas/VotingStrategyEnum"
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/classifyImage_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResponse"
          description: Classification successful
        "400":
          content:
            application/json:
              examples:
                moduleNotAvailable:
                  value:
                    error: Classification module not available
                invalidVotingStrategy:
                  value:
                    error: Invalid voting_strategy 'invalid'. Must be 'soft' or 'hard'
                noPreprocessedImages:
                  value:
                    error: No valid preprocessed images provided
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid request or classification module not available
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Classification error
        "429":
          content:
            application/json:
              examples:
                queueFull:
                  value:
                    error: Dynamic batch queue is full
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Dynamic inference queue is full
        "503":
          content:
            application/json:
              examples:
                queueTimeout:
                  value:
                    error: Inference queue timeout
                    timeout_seconds: 15
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Dynamic inference queue wait timeout
      summary: Classify from preprocessed images
      tags:
      - Single processing
      x-openapi-router-controller: ensemble_inference.controllers.single_processing_controller
  /config:
    get:
      description: Retrieve current server configuration
      operationId: get_config
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
          description: Configuration details
      summary: Get configuration details
      tags:
      - Health & Info
      x-openapi-router-controller: ensemble_inference.controllers.health_&_info_controller
  /health:
    get:
      description: Check server health status and uptime
      operationId: health_check
      responses:
        "200":
          content:
            application/json:
              example:
                status: healthy
                timestamp: 1.73E9
                uptime: 3600.5
                modules:
                  preprocessor: true
                  classifier: true
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Server is healthy
      summary: Health check
      tags:
      - Health & Info
      x-openapi-router-controller: ensemble_inference.controllers.health_&_info_controller
  /info:
    get:
      description: Retrieve detailed information about available modules and endpoints
      operationId: get_info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
          description: Server information
      summary: Get server information
      tags:
      - Health & Info
      x-openapi-router-controller: ensemble_inference.controllers.health_&_info_controller
  /models:
    get:
      description: Retrieve information about loaded classification models
      operationId: get_models
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInfoResponse"
          description: Model information
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Classification module not available
      summary: Get model information
      tags:
      - Health & Info
      x-openapi-router-controller: ensemble_inference.controllers.health_&_info_controller
  /preprocess:
    post:
      description: Apply preprocessing pipeline to generate 5 image variants
      operationId: preprocess_image
      parameters:
      - description: Include preprocessed images in response (results not cached if
          true)
        examples:
          include:
            summary: Include preprocessed encoded images
            value: true
          exclude:
            summary: Exclude preprocessed encoded images (default)
            value: false
        explode: true
        in: query
        name: include_encoded_images
        required: false
        schema:
          default: false
          type: boolean
        style: form
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/preprocessImage_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreprocessResponse"
          description: Preprocessing successful
        "400":
          content:
            application/json:
              examples:
                noImage:
                  value:
                    error: No valid image provided
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Processing error
      summary: Preprocess a single image
      tags:
      - Single processing
      x-openapi-router-controller: ensemble_inference.controllers.single_processing_controller
  /process:
    post:
      description: |
        Complete pipeline from raw image to classification result.

        **Single Image Only**: This endpoint accepts exactly ONE image.

        **Caching**: Results are cached with Redis based on image hash and model configuration.
        Cached responses return near-instant results with `cached=true` indicator.

        **Dynamic batching**: Classification stage may be dynamically micro-batched server-side.
        This behavior is transparent to clients.
      operationId: full_process
      parameters:
      - description: Ensemble voting strategy for classification
        examples:
          soft:
            summary: Soft voting (probability averaging)
            value: soft
          hard:
            summary: Hard voting (majority vote)
            value: hard
        explode: true
        in: query
        name: voting_strategy
        required: false
        schema:
          $ref: "#/components/schemas/VotingStrategyEnum"
        style: form
      - description: Include preprocessed images in response (results not cached if
          true)
        examples:
          include:
            summary: Include preprocessed encoded images
            value: true
          exclude:
            summary: Exclude preprocessed encoded images (default)
            value: false
        explode: true
        in: query
        name: include_encoded_images
        required: false
        schema:
          default: false
          type: boolean
        style: form
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/fullProcess_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResponse"
          description: Processing successful
        "400":
          content:
            application/json:
              examples:
                multipleImages:
                  value:
                    error: Single image endpoint accepts only one image.
                    images_provided: 3
                    max_allowed: 1
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Invalid request (e.g., multiple images provided)"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Processing error
        "429":
          content:
            application/json:
              examples:
                queueFull:
                  value:
                    error: Dynamic batch queue is full
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Dynamic inference queue is full
        "503":
          content:
            application/json:
              examples:
                queueTimeout:
                  value:
                    error: Inference queue timeout
                    timeout_seconds: 15
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Dynamic inference queue wait timeout
      summary: Full pipeline (preprocess + classify)
      tags:
      - Single processing
      x-openapi-router-controller: ensemble_inference.controllers.single_processing_controller
